version: "3"

vars:
  PYTHON_BIN: '{{.PYTHON_BIN | default "/Users/apprenticegc/.pyenv/versions/3.13.4/bin/python3"}}'
  GODOT_PATH: '{{.GODOT_PATH | default "/Users/apprenticegc/Work/lunar-horse/tools/Godot.app/Contents/MacOS/Godot"}}'
  SERVER_DIR: "project/server"
  GAME_SERVER_DIR: "project/server/packages/game-server"
  GODOT_PROJECT_DIR: "project/hosts/complete-app"
  ARTIFACTS_DIR: "build/_artifacts"

tasks:
  setup:
    desc: Install all dependencies, link shared/, seed Godot caches, and download templates
    cmds:
      - '{{.PYTHON_BIN}} -m pip install --user jsonschema'
      - '{{.PYTHON_BIN}} scripts/download_templates.py'
      - cd {{.SERVER_DIR}} && pnpm install
      - pre-commit install
      - task: share:link
      - task: skills:sync
      - task: setup:godot

  share:link:
    desc: Create cross-platform links from host projects to project/shared/
    cmds:
      - '{{.PYTHON_BIN}} scripts/setup_shared_links.py'

  skills:sync:
    desc: Mirror .agent/skills/{category}/{skill}/ into .claude/skills/{skill}/ so Claude Code can discover them
    cmds:
      - '{{.PYTHON_BIN}} scripts/sync_claude_skills.py'

  setup:godot:
    desc: Seed Godot .godot/ caches by running each host project once headlessly
    cmds:
      - '{{.GODOT_PATH}} --editor --headless --quit --path project/hosts/complete-app'
      - '{{.GODOT_PATH}} --editor --headless --quit --path project/hosts/content-app'

  version:
    desc: Print the current GitVersion SemVer
    cmds:
      - dotnet-gitversion /showvariable SemVer

  build:
    desc: Export Godot project for web into a versioned artifact directory
    vars:
      VERSION:
        sh: dotnet-gitversion /showvariable SemVer
    cmds:
      - mkdir -p {{.ARTIFACTS_DIR}}/{{.VERSION}}/web
      - mkdir -p {{.ARTIFACTS_DIR}}/{{.VERSION}}/screenshots
      - mkdir -p {{.ARTIFACTS_DIR}}/{{.VERSION}}/replay
      # Stamp the build version into shared/data so main.gd can read it at
      # runtime via res://data/build_version.txt. Gitignored — regenerated
      # on each build, never committed.
      - echo "{{.VERSION}}" > project/shared/data/build_version.txt
      - >-
        {{.PYTHON_BIN}} scripts/run_godot_checked.py
        {{.GODOT_PATH}} --headless --path {{.GODOT_PROJECT_DIR}}
        --export-release "Web"
        {{.ROOT_DIR}}/{{.ARTIFACTS_DIR}}/{{.VERSION}}/web/complete-app.html
      - mkdir -p {{.ARTIFACTS_DIR}}/{{.VERSION}}/web/pck
      - cp {{.ARTIFACTS_DIR}}/pck/*.pck {{.ARTIFACTS_DIR}}/{{.VERSION}}/web/pck/ 2>/dev/null || true
      - rm -f {{.ARTIFACTS_DIR}}/latest
      - ln -s {{.VERSION}} {{.ARTIFACTS_DIR}}/latest
      - echo "Built version {{.VERSION}} -> {{.ARTIFACTS_DIR}}/{{.VERSION}}/web/"

  dev:
    desc: Start WebSocket server (nodemon) and static file server in parallel
    deps:
      - dev:ws
      - dev:static

  dev:ws:
    desc: Start WebSocket game server with nodemon
    dir: "{{.GAME_SERVER_DIR}}"
    cmds:
      - pnpm run dev

  dev:static:
    desc: Serve latest web build with COOP/COEP headers
    cmds:
      - node scripts/serve_web.js {{.ARTIFACTS_DIR}}/latest/web

  serve:
    desc: Serve latest web build only (no WS server)
    cmds:
      - node scripts/serve_web.js {{.ARTIFACTS_DIR}}/latest/web

  serve:https:
    desc: Serve latest web build over HTTPS (for cross-machine testing)
    env:
      SERVE_HTTPS: "1"
    cmds:
      - node scripts/serve_web.js {{.ARTIFACTS_DIR}}/latest/web

  lint:
    desc: Run all linters
    cmds:
      - cd {{.SERVER_DIR}} && pnpm run lint
      - '{{.PYTHON_BIN}} -m ruff check scripts/'

  format:
    desc: Run all formatters
    cmds:
      - cd {{.SERVER_DIR}} && pnpm run format
      - '{{.PYTHON_BIN}} -m ruff format scripts/'

  clean:
    desc: Remove all build artifacts
    cmds:
      - rm -rf {{.ARTIFACTS_DIR}}/*
      - touch {{.ARTIFACTS_DIR}}/.gitkeep

  changelog:
    desc: Generate changelog with git-cliff
    cmds:
      - git-cliff -o CHANGELOG.md

  test:
    desc: Run all test suites (pytest, vitest, GUT, playwright)
    cmds:
      - task: test:python
      - task: test:server
      - task: test:godot
      - task: test:e2e

  test:python:
    desc: Run Python tests (pytest)
    cmds:
      - '{{.PYTHON_BIN}} -m pytest tests/ -v'

  test:server:
    desc: Run game-server integration tests (vitest)
    dir: "{{.GAME_SERVER_DIR}}"
    cmds:
      - pnpm test

  test:godot:
    desc: Run Godot unit tests (GUT, headless)
    cmds:
      - >-
        {{.PYTHON_BIN}} scripts/run_godot_checked.py
        {{.GODOT_PATH}} --headless
        --path {{.GODOT_PROJECT_DIR}}
        -s addons/gut/gut_cmdln.gd -gexit

  test:e2e:
    desc: Run browser E2E tests (Playwright, requires web build)
    dir: "project/server/packages/e2e"
    cmds:
      - pnpm exec playwright test

  tileset:preprocess:
    desc: Slice and reassemble clean 32x32 tile atlas from ComfyUI output
    cmds:
      - "{{.PYTHON_BIN}} scripts/tileset_preprocess.py --biome={{.CLI_ARGS}} --tile-size=32"

  tileset:classify:
    desc: Classify and rearrange tileset atlas into semantic IntGrid order
    cmds:
      - "{{.PYTHON_BIN}} scripts/tile_classifier.py --biome={{.CLI_ARGS}}"

  pck:manifest:
    desc: Generate PCK manifest from LDtk data
    cmds:
      - "{{.PYTHON_BIN}} scripts/pck_manifest.py --location={{.CLI_ARGS}}"

  pck:build:
    desc: Build location PCK (manifest + Godot headless pack)
    cmds:
      - task: pck:manifest
        vars: { CLI_ARGS: "{{.CLI_ARGS}}" }
      - >-
        {{.PYTHON_BIN}} scripts/run_godot_checked.py
        {{.GODOT_PATH}} --headless
        --path project/hosts/content-app
        --script scripts/pck_builder.gd
        -- --location={{.CLI_ARGS}}

  content:build:
    desc: Build a single content bundle into a PCK (use -- {bundle-id})
    cmds:
      - >-
        {{.PYTHON_BIN}} scripts/run_godot_checked.py
        {{.GODOT_PATH}} --headless
        --path project/hosts/content-app
        --script scripts/bundle_packager.gd
        -- --bundle={{.CLI_ARGS}}
      - task: content:manifest

  content:manifest:
    desc: Regenerate project/shared/data/content_manifest.json
    cmds:
      - '{{.PYTHON_BIN}} scripts/content_manifest.py'

  content:build:all:
    desc: Build every bundle declared under project/shared/content/**/bundle.json
    cmds:
      - '{{.PYTHON_BIN}} scripts/build_all_bundles.py'

  articy:build:
    desc: Build and deploy MDK plugin to articy local plugins folder
    dir: project/articy/mdk-plugin/LegendDad.MdkPlugin
    vars:
      PLUGIN_DIR: '{{.HOME}}/AppData/Roaming/Articy Software/articy/4.x/Plugins/Local/LegendDad.MdkPlugin/0.1.0'
      BUILD_DIR: bin/Debug/net8.0-windows/win-x64
    cmds:
      - dotnet build LegendDad.MdkPlugin.csproj -c Debug
      - mkdir -p "{{.PLUGIN_DIR}}/Resources"
      - cp "{{.BUILD_DIR}}/LegendDad.MdkPlugin.dll" "{{.PLUGIN_DIR}}/"
      - cp "{{.BUILD_DIR}}/LegendDad.MdkPlugin.deps.json" "{{.PLUGIN_DIR}}/"
      - cp "{{.BUILD_DIR}}/PluginManifest.xml" "{{.PLUGIN_DIR}}/"
      - cp "{{.BUILD_DIR}}/PluginTexts.tpk" "{{.PLUGIN_DIR}}/"
      - cp Resources/Icon.png "{{.PLUGIN_DIR}}/Resources/"
      - echo "Plugin deployed to {{.PLUGIN_DIR}}"

  articy:prep:
    desc: Generate articy import manifest from vault/world/ (with diffing)
    cmds:
      - >-
        python3 scripts/vault_to_manifest.py
        vault/world
        project/articy/import-manifest.json
        --schema project/articy/schemas/import-manifest.schema.json
        --previous project/articy/import-manifest.json

  articy:types:
    desc: Regenerate typed code from articy JSON schemas via quicktype
    cmds:
      - mkdir -p project/articy/generated/python
      - mkdir -p project/articy/generated/csharp
      - >-
        quicktype
        --src-lang schema
        --lang python
        --python-version 3.7
        -o project/articy/generated/python/import_manifest.py
        project/articy/schemas/import-manifest.schema.json
      - >-
        quicktype
        --src-lang schema
        --lang csharp
        --namespace LegendDad.Articy
        -o project/articy/generated/csharp/ImportManifest.cs
        project/articy/schemas/import-manifest.schema.json
      - echo "Types generated in project/articy/generated/"

  articy:writeback:
    desc: Write articy IDs from manifest back to vault frontmatter
    cmds:
      - >-
        python3 scripts/writeback_articy_ids.py
        project/articy/import-manifest.json

  content:generate:tres:
    desc: Regenerate bestiary + encounter .tres files from import manifest
    cmds:
      - python3 scripts/adapters/canonical_to_godot.py

  articy:validate:
    desc: Validate existing import manifest against JSON schema
    cmds:
      - >-
        python3 -c
        "import json, jsonschema; schema = json.load(open('project/articy/schemas/import-manifest.schema.json')); manifest = json.load(open('project/articy/import-manifest.json')); jsonschema.validate(manifest, schema); k='entities'; print(f'Valid: {len(manifest[k])} entities')"

  comfyui:ping:
    desc: Check if ComfyUI server is reachable
    cmds:
      - >-
        node -e "
        fetch(process.env.COMFYUI_BASE_URL || 'http://127.0.0.1:8188/system_stats')
          .then(r => r.json())
          .then(d => console.log('ComfyUI online:', d.system?.devices?.[0]?.name || 'ok'))
          .catch(e => { console.error('ComfyUI unreachable:', e.message); process.exit(1); })
        "

  comfyui:tileset:
    desc: Generate grayscale tileset for a biome (field, dungeon, town, or all)
    cmds:
      - node project/comfyui/lib/tileset-runner.mjs {{.CLI_ARGS}}

  comfyui:tileset:dry-run:
    desc: Preview tileset job without submitting to ComfyUI
    cmds:
      - node project/comfyui/lib/tileset-runner.mjs --dry-run {{.CLI_ARGS}}

  comfyui:palettes:
    desc: Generate palette .hex files from vault location frontmatter
    cmds:
      - node project/comfyui/lib/palette-generator.mjs

  ldtk:sync:
    desc: Sync vault entity definitions into LDtk project file
    cmds:
      - >-
        python3 scripts/ldtk_sync.py
        project/articy/import-manifest.json
        project/ldtk/legend-dad.ldtk
