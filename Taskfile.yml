version: "3"

vars:
  GODOT_PATH: '{{.GODOT_PATH | default "/Users/apprenticegc/Work/lunar-horse/tools/Godot.app/Contents/MacOS/Godot"}}'
  SERVER_DIR: "project/server"
  GAME_SERVER_DIR: "project/server/packages/game-server"
  GODOT_PROJECT_DIR: "project/hosts/complete-app"
  ARTIFACTS_DIR: "build/_artifacts"

tasks:
  setup:
    desc: Install all dependencies and download Godot export templates
    cmds:
      - python3 scripts/download_templates.py
      - cd {{.SERVER_DIR}} && pnpm install
      - pre-commit install

  version:
    desc: Print the current GitVersion SemVer
    cmds:
      - dotnet-gitversion /showvariable SemVer

  build:
    desc: Export Godot project for web into a versioned artifact directory
    vars:
      VERSION:
        sh: dotnet-gitversion /showvariable SemVer
    cmds:
      - mkdir -p {{.ARTIFACTS_DIR}}/{{.VERSION}}/web
      - mkdir -p {{.ARTIFACTS_DIR}}/{{.VERSION}}/screenshots
      - mkdir -p {{.ARTIFACTS_DIR}}/{{.VERSION}}/replay
      - >-
        {{.GODOT_PATH}} --headless --path {{.GODOT_PROJECT_DIR}}
        --export-release "Web"
        {{.ROOT_DIR}}/{{.ARTIFACTS_DIR}}/{{.VERSION}}/web/complete-app.html
      - rm -f {{.ARTIFACTS_DIR}}/latest
      - ln -s {{.VERSION}} {{.ARTIFACTS_DIR}}/latest
      - echo "Built version {{.VERSION}} -> {{.ARTIFACTS_DIR}}/{{.VERSION}}/web/"

  dev:
    desc: Start WebSocket server (nodemon) and static file server in parallel
    deps:
      - dev:ws
      - dev:static

  dev:ws:
    desc: Start WebSocket game server with nodemon
    dir: "{{.GAME_SERVER_DIR}}"
    cmds:
      - pnpm run dev

  dev:static:
    desc: Serve latest web build with COOP/COEP headers
    cmds:
      - node scripts/serve_web.js {{.ARTIFACTS_DIR}}/latest/web

  serve:
    desc: Serve latest web build only (no WS server)
    cmds:
      - node scripts/serve_web.js {{.ARTIFACTS_DIR}}/latest/web

  lint:
    desc: Run all linters
    cmds:
      - cd {{.SERVER_DIR}} && pnpm run lint
      - ruff check scripts/

  format:
    desc: Run all formatters
    cmds:
      - cd {{.SERVER_DIR}} && pnpm run format
      - ruff format scripts/

  clean:
    desc: Remove all build artifacts
    cmds:
      - rm -rf {{.ARTIFACTS_DIR}}/*
      - touch {{.ARTIFACTS_DIR}}/.gitkeep

  changelog:
    desc: Generate changelog with git-cliff
    cmds:
      - git-cliff -o CHANGELOG.md
